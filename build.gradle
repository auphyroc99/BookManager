plugins {
    id 'nu.studer.jooq' version '9.0'
    id 'org.jetbrains.kotlin.jvm' version '2.2.21'
    id "org.jetbrains.kotlin.plugin.spring" version '2.2.21'
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

repositories {
    mavenCentral()
}

subprojects {
    repositories {
        mavenCentral()
    }
}

// Provide a no-op task expected by some IDE/Gradle integrations (e.g. older IntelliJ import)
// that may request `prepareKotlinBuildScriptModel` on subprojects. Some Kotlin Gradle
// plugin versions don't create this task, which causes IDE sync to fail. Register a
// harmless task in all subprojects to satisfy such tooling.
subprojects {
    tasks.register('prepareKotlinBuildScriptModel') {
        // intentionally empty: present to satisfy IDE/Gradle tooling that expects it
    }
}

dependencies {
    jooqGenerator 'org.postgresql:postgresql:42.6.0'
}

jooq {
    version = '3.19.32'

    configurations {
        create('main') {
            generationTool {
                jdbc {
                    driver = 'org.postgresql.Driver'
                    url = 'jdbc:postgresql://localhost:5432/book_manager'
                    user = 'myuser'
                    password = 'mypassword'
                }
                generator {
                    database {
                        name = 'org.jooq.meta.postgres.PostgresDatabase'
                        inputSchema = 'public'
                        includes = '.*'
                        excludes = 'flyway_schema_history|flyway_schema_history_.*'
                    }
                    target {
                        packageName = 'com.bookmanager.jooq'
                        directory = 'generated/src/main/java'
                    }
                }
            }
        }
    }
}
