spring:
  application:
    name: book-manager

  datasource:
    url: jdbc:postgresql://localhost:5432/book_manager
    username: myuser
    password: mypassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
